services:
  db:
    image: postgres:16-alpine
    container_name: archlily-db
    environment:
      POSTGRES_USER: archlily
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: archlily
    ports:
      - "5433:5432"
    volumes:
      - archlily_pgdata:/var/lib/postgresql/data

volumes:
  archlily_pgdata:
